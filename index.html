<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- ====== iOS / PWA REQUIRED (CRÍTICO PARA IPAD) ====== -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Majestic Obras">

  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a2342">

  <title>Majestic Colonial · Control de Obras</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:15px;
      background:#f8fafc;
      color:#111827;
    }
    select,input,textarea,button{
      font-family:inherit;font-size:13px
    }
    select,input[type=text]{
      padding:6px 10px;border-radius:7px;border:0.5px solid #d1d5db;
      background:#fff;height:34px;outline:none
    }
    textarea{
      border:0.5px solid #d1d5db;border-radius:8px;
      padding:10px 12px;font-size:14px;resize:vertical;
      background:#f9fafb;line-height:1.5;width:100%;min-height:90px
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 0.8s linear infinite}
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>

/* ===================== CONFIG ===================== */
const STORAGE_KEY = "majestic-colonial-checklist-v1";

/* ===================== STORAGE (LOCAL) ===================== */
function loadFromStorage() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) state.roomData = JSON.parse(data);
  } catch (e) {
    console.error("Error cargando datos", e);
  }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.roomData));
  } catch (e) {
    console.error("Error guardando datos", e);
  }
}

/* ===================== DATA ===================== */

const state = {
  roomData:{}
};

/* ===================== UI SIMPLE ===================== */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div style="padding:16px;font-weight:700;background:#0a2342;color:#c9a84c">
      MAJESTIC COLONIAL · CONTROL DE OBRAS
    </div>
    <div style="padding:16px">
      ${ITEMS.map(i => `
        <div style="margin-bottom:8px;border:1px solid #e5e7eb;
          padding:10px;border-radius:8px;background:#fff">
          <label>
            <input type="checkbox"
              ${state.roomData[i.id] ? "checked" : ""}
              onchange="toggle(${i.id})">
            ${i.desc}
          </label>
        </div>
      `).join("")}
    </div>
  `;
}

function toggle(id){
  state.roomData[id] = !state.roomData[id];
  saveToStorage();
}

/* ===================== INIT ===================== */
loadFromStorage();
render();

/* ===================== SERVICE WORKER ===================== */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
