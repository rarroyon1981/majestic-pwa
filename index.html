// ─── LOCALSTORAGE ─────────────────────────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state.roomData = JSON.parse(raw);
  } catch(_) {}
}

function scheduleSave() {
  state.saveStatus = "saving"; renderHeader();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.roomData));
      state.saveStatus = "saved"; renderHeader();
      setTimeout(() => { state.saveStatus = "idle"; renderHeader(); }, 2500);
    } catch(_) { state.saveStatus = "error"; renderHeader(); }
  }, 600);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function fmtPct(v,t){ return t===0?"0%":Math.round((v/t)*100)+"%"; }

function getRoomStats(roomId) {
  const rd = state.roomData[roomId];
  if (!rd) return {started:0,finished:0,total:ITEMS.length};
  const vals = Object.values(rd.items||{});
  return {started:vals.filter(i=>i.started).length, finished:vals.filter(i=>i.finished).length, total:ITEMS.length};
}
function getTouchedCount() {
  return Object.keys(state.roomData).filter(r => {
    const rd=state.roomData[r]; return rd&&(Object.values(rd.items||{}).some(i=>i.started)||rd.notes);
  }).length;
}
function getCurrentFloors(){ return BUILDINGS[state.selBuilding]?.floors||{}; }
function getCurrentRooms(){
  const rooms=getCurrentFloors()[state.selFloor]?.rooms||[];
  return state.search?rooms.filter(r=>r.includes(state.search)):rooms;
}
function computeStats(roomIds){
  let totalItems=0,startedItems=0,finishedItems=0,touchedRooms=0,completeRooms=0;
  roomIds.forEach(rid=>{
    const s=getRoomStats(rid);
    totalItems+=s.total;startedItems+=s.started;finishedItems+=s.finished;
    if(s.started>0)touchedRooms++;
    if(s.finished===s.total)completeRooms++;
  });
  return {totalRooms:roomIds.length,touchedRooms,completeRooms,totalItems,startedItems,finishedItems};
}

// ─── MUTATIONS ────────────────────────────────────────────────────────────────
function toggleItem(roomId,itemId,field){
  const ts=new Date().toISOString();
  if(!state.roomData[roomId]) state.roomData[roomId]={items:{},notes:""};
  const room=state.roomData[roomId];
  if(!room.items[itemId]) room.items[itemId]={started:false,startedAt:null,finished:false,finishedAt:null};
  const item=room.items[itemId];
  if(field==="started"){
    if(item.started){item.started=false;item.startedAt=null;item.finished=false;item.finishedAt=null;}
    else{item.started=true;item.startedAt=ts;}
  } else {
    if(item.finished){item.finished=false;item.finishedAt=null;}
    else{item.finished=true;item.finishedAt=ts;if(!item.started){item.started=true;item.startedAt=ts;}}
  }
  scheduleSave(); renderRoomDetail(); renderRoomList(); renderHeader();
}
function updateNotes(roomId,notes){
  if(!state.roomData[roomId]) state.roomData[roomId]={items:{},notes:""};
  state.roomData[roomId].notes=notes;
  scheduleSave();
}
function resetAll(){
  if(!confirm("¿Borrar todos los datos? Esta acción no se puede deshacer.")) return;
  state.roomData={}; state.selRoom=null;
  try{localStorage.removeItem(STORAGE_KEY);}catch(_){}
  render();
}

function buildCellStyle(bold,bgRGB,fontRGB,center){
  return {
    font:{bold:!!bold,color:{rgb:fontRGB||"000000"}},
    fill:bgRGB?{fgColor:{rgb:bgRGB}}:undefined,
    alignment:{horizontal:center?"center":"left",vertical:"center",wrapText:true},
    border:{top:{style:"thin",color:{rgb:"CCCCCC"}},bottom:{style:"thin",color:{rgb:"CCCCCC"}},left:{style:"thin",color:{rgb:"CCCCCC"}},right:{style:"thin",color:{rgb:"CCCCCC"}}}
  };
}
function updRange(ws,r,c){
  if(!ws["!ref"]){ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r,c}});return;}
  const cur=XLSX.utils.decode_range(ws["!ref"]);
  if(r>cur.e.r)cur.e.r=r; if(c>cur.e.c)cur.e.c=c;
  ws["!ref"]=XLSX.utils.encode_range(cur);
}

  if(typeof XLSX==="undefined"){alert("Librería Excel no disponible. Necesitas conexión a internet la primera vez.");return;}

  const exportDate=fmtDate(new Date().toISOString());
  const NAVY="0A2342",GOLD="C9A84C",GREEN="1A7A3E",LTGREEN="D1FAE5",LGRAY="F5F5F5";
  const allRooms=Object.values(BUILDINGS).flatMap(b=>Object.values(b.floors).flatMap(f=>f.rooms));

  // ── HOJA 1: RESUMEN GENERAL ──
  const wsG={};wsG["!merges"]=[];let rG=0;
  wsG[XLSX.utils.encode_cell({r:rG,c:0})]={v:"MAJESTIC COLONIAL PUNTA CANA — CONTROL DE AVANCE DE OBRAS",t:"s",s:buildCellStyle(true,NAVY,"FFFFFF",true)};
  wsG["!merges"].push({s:{r:rG,c:0},e:{r:rG,c:7}});rG++;
  wsG[XLSX.utils.encode_cell({r:rG,c:0})]={v:`Fecha de exportación: ${exportDate}`,t:"s",s:buildCellStyle(false,GOLD,NAVY,true)};
  wsG["!merges"].push({s:{r:rG,c:0},e:{r:rG,c:7}});rG++;rG++;

  const gStats=computeStats(allRooms);
  const hS=buildCellStyle(true,NAVY,"FFFFFF",true);
  const nS=buildCellStyle(false,LGRAY,"000000",true);
  const pS=buildCellStyle(true,LTGREEN,GREEN,true);

  wsG[XLSX.utils.encode_cell({r:rG,c:0})]={v:"RESUMEN GENERAL DEL HOTEL",t:"s",s:buildCellStyle(true,GOLD,NAVY,false)};
  wsG["!merges"].push({s:{r:rG,c:0},e:{r:rG,c:7}});rG++;
  ["Total Habitaciones","Hab. Iniciadas","Hab. Completadas","% Completadas","Total Ítems","Ítems Iniciados","Ítems Terminados","% Ítems Terminados"].forEach((h,ci)=>{wsG[XLSX.utils.encode_cell({r:rG,c:ci})]={v:h,t:"s",s:hS};});rG++;
  [gStats.totalRooms,gStats.touchedRooms,gStats.completeRooms,fmtPct(gStats.completeRooms,gStats.totalRooms),gStats.totalItems,gStats.startedItems,gStats.finishedItems,fmtPct(gStats.finishedItems,gStats.totalItems)].forEach((v,ci)=>{wsG[XLSX.utils.encode_cell({r:rG,c:ci})]={v,t:typeof v==="number"?"n":"s",s:ci===3||ci===7?pS:nS};});rG++;rG++;

      items.forEach(item=>{
        const is=rd2.items[item.id]||{};
        const started=!!is.started,finished=!!is.finished;
        const rowBg=finished?"#f0fdf4":started?"#fffbeb":"var(--color-background-primary)";
        const row=document.createElement("div");
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);background:${rowBg};min-height:54px`;
        const num=document.createElement("span");num.style.cssText="width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--color-background-secondary);color:var(--color-text-tertiary)";num.textContent=item.id;
        const desc=document.createElement("span");desc.style.cssText=`flex:1;font-size:14px;line-height:1.35;color:${finished?"#15803d":"var(--color-text-primary)"}`;desc.textContent=item.desc;
        const btnS=document.createElement("button");
        btnS.style.cssText=`flex-shrink:0;width:84px;height:42px;border-radius:8px;border:1.5px solid ${started?"#d97706":"var(--color-border-secondary)"};background:${started?"#d97706":"transparent"};color:${started?"#fff":"var(--color-text-tertiary)"};font-size:12px;font-weight:600;cursor:pointer`;
        btnS.textContent=started?"✓ Iniciada":"Iniciada";btnS.onclick=()=>toggleItem(roomId,item.id,"started");
        const btnF=document.createElement("button");
        btnF.style.cssText=`flex-shrink:0;width:90px;height:42px;border-radius:8px;border:1.5px solid ${finished?"#16a34a":"var(--color-border-secondary)"};background:${finished?"#16a34a":"transparent"};color:${finished?"#fff":"var(--color-text-tertiary)"};font-size:12px;font-weight:600;cursor:pointer`;
        btnF.textContent=finished?"✓ Terminada":"Terminada";btnF.onclick=()=>toggleItem(roomId,item.id,"finished");
        row.appendChild(num);row.appendChild(desc);row.appendChild(btnS);row.appendChild(btnF);
        section.appendChild(row);
      });
    }
    detail.appendChild(section);
  });

  const noteCard=document.createElement("div");
  noteCard.style.cssText="background:var(--color-background-primary);border-radius:12px;padding:14px 16px;margin-top:12px;border:0.5px solid var(--color-border-tertiary)";
  const noteLbl=document.createElement("div");noteLbl.style.cssText="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--color-text-secondary)";noteLbl.textContent="📝 Notas y observaciones";
  const ta=document.createElement("textarea");ta.value=rd2.notes||"";ta.placeholder="Incidencias, pendientes, materiales faltantes…";ta.rows=4;
  const charCnt=document.createElement("div");charCnt.style.cssText="font-size:11px;color:var(--color-text-tertiary);margin-top:4px";charCnt.textContent=`${(rd2.notes||"").length} caracteres`;
  ta.oninput=e=>{updateNotes(roomId,e.target.value);charCnt.textContent=`${e.target.value.length} caracteres`;};
  noteCard.appendChild(noteLbl);noteCard.appendChild(ta);noteCard.appendChild(charCnt);
  detail.appendChild(noteCard);
  const sp=document.createElement("div");sp.style.height="calc(env(safe-area-inset-bottom,0px) + 32px)";detail.appendChild(sp);
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const hS=document.createElement("div");hS.id="app-header";app.appendChild(hS);
  const nS=document.createElement("nav");nS.id="app-nav";app.appendChild(nS);
  const content=document.createElement("div");content.id="app-content";
  content.style.cssText="flex:1;display:flex;overflow:hidden";
  const aside=document.createElement("aside");aside.id="room-list";
  aside.style.cssText="width:260px;min-width:260px;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-primary);overflow:hidden";
  const main=document.createElement("main");main.id="room-detail";
  main.style.cssText="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch";
  content.appendChild(aside);content.appendChild(main);app.appendChild(content);
  renderHeader();renderNav();renderRoomList();renderRoomDetail();updateMobilePanels();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadData();
render();

// Service Worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}

window.addEventListener("resize", updateMobilePanels);
</script>
</body>
</html>
