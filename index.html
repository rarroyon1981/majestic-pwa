let state = {

let saveTimer = null;


function loadFromStorage() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) state.roomData = JSON.parse(data);
  } catch (e) {
    console.error("Error cargando datos", e);
  }
}

function scheduleSave() {
  state.saveStatus = "saving";
  renderHeader();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.roomData));
      state.saveStatus = "saved";
      renderHeader();
      setTimeout(() => { state.saveStatus = "idle"; renderHeader(); }, 2500);
    } catch(_) {
      state.saveStatus = "error";
      renderHeader();
    }
  }, 600);
}

function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function getRoomStats(roomId) {
  const rd = state.roomData[roomId];
  if (!rd) return {started:0,finished:0,total:ITEMS.length};
  const vals = Object.values(rd.items||{});
  return {started:vals.filter(i=>i.started).length, finished:vals.filter(i=>i.finished).length, total:ITEMS.length};
}

function getTouchedCount() {
  return Object.keys(state.roomData).filter(r => {
    const rd = state.roomData[r];
    return rd && (Object.values(rd.items||{}).some(i=>i.started) || rd.notes);
  }).length;
}

function getCurrentFloors() { return BUILDINGS[state.selBuilding]?.floors || {}; }
function getCurrentRooms() {
  const rooms = getCurrentFloors()[state.selFloor]?.rooms || [];
  return state.search ? rooms.filter(r => r.includes(state.search)) : rooms;
}

function toggleItem(roomId, itemId, field) {
  const ts = new Date().toISOString();
  if (!state.roomData[roomId]) state.roomData[roomId] = {items:{}, notes:""};
  const room = state.roomData[roomId];
  if (!room.items[itemId]) room.items[itemId] = {started:false,startedAt:null,finished:false,finishedAt:null};
  const item = room.items[itemId];
  if (field === "started") {
    if (item.started) { item.started=false; item.startedAt=null; item.finished=false; item.finishedAt=null; }
    else              { item.started=true;  item.startedAt=ts; }
  } else {
    if (item.finished) { item.finished=false; item.finishedAt=null; }
    else               { item.finished=true; item.finishedAt=ts; if(!item.started){item.started=true;item.startedAt=ts;} }
  }
  scheduleSave();
  renderRoomDetail();
  renderRoomList();
  renderHeader();
}

function updateNotes(roomId, notes) {
  if (!state.roomData[roomId]) state.roomData[roomId] = {items:{}, notes:""};
  state.roomData[roomId].notes = notes;
  scheduleSave();
}

async function resetAll() {
  state.roomData = {};

  state.confirmReset = false;
  try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
  render();
}

// ── EXCEL EXPORT con SheetJS ───────────────────────────────────────────────
function exportExcel(mode) {
  if (typeof XLSX === "undefined") { alert("La librería Excel todavía está cargando, inténtalo en unos segundos."); return; }

  const rows = [];
  Object.entries(BUILDINGS).forEach(([bid,building]) => {
    Object.entries(building.floors).forEach(([fid,floor]) => {
      floor.rooms.forEach(roomId => {
        if (mode === "modified" && !state.roomData[roomId]) return;
        const rd = state.roomData[roomId] || {items:{},notes:""};
        ITEMS.forEach(item => {
          const is = rd.items[item.id] || {};
          rows.push({
            "Edificio":          building.name,
            "Planta":            floor.name,
            "Habitación":        roomId,
            "Nº Ítem":           item.id,
            "Categoría":         item.cat,
            "Descripción":       item.desc,
            "Empezada":          is.started  ? "Sí" : "No",
            "Fecha Inicio":      fmtDate(is.startedAt),
            "Terminada":         is.finished ? "Sí" : "No",
            "Fecha Fin":         fmtDate(is.finishedAt),
            "Notas Habitación":  rd.notes || "",
          });
        });
      });
    });
  });

  if (!rows.length) { alert("No hay datos para exportar."); return; }

  const ws = XLSX.utils.json_to_sheet(rows);

  // Column widths
  ws["!cols"] = [
    {wch:24}, {wch:12}, {wch:12}, {wch:8},
    {wch:30}, {wch:42}, {wch:10}, {wch:18},
    {wch:10}, {wch:18}, {wch:32},
  ];

  // Bold header row
  const range = XLSX.utils.decode_range(ws["!ref"]);
  for (let C = range.s.c; C <= range.e.c; C++) {
    const cellAddr = XLSX.utils.encode_cell({r:0, c:C});
    if (!ws[cellAddr]) continue;
    ws[cellAddr].s = {font:{bold:true}, fill:{fgColor:{rgb:"0A2342"}}, font:{bold:true,color:{rgb:"FFFFFF"}}};
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Avance Reforma");

  // Metadata
  wb.Props = {
    Title: "Control de Avance de Obras",
    Subject: "Majestic Colonial Punta Cana",
    Author: "Project Manager",
    CreatedDate: new Date(),
  };

  const filename = `avance_majestic_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, filename);

  state.exportMenu = false;
  renderHeader();
}

    resetBox.appendChild(lbl); resetBox.appendChild(yes); resetBox.appendChild(no);
    el.appendChild(resetBox);
  } else {
    const resetBtn=document.createElement("button");
    resetBtn.textContent="Borrar datos"; resetBtn.style.cssText="background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.55);font-size:11px;padding:5px 8px;border-radius:7px;cursor:pointer;flex-shrink:0";
    resetBtn.onclick=()=>{state.confirmReset=true;renderHeader();};
    el.appendChild(resetBtn);
  }

  // Export
  const exportWrap = document.createElement("div");
  exportWrap.style.cssText="position:relative;flex-shrink:0";
  const exportBtn=document.createElement("button");
  exportBtn.style.cssText="background:#c9a84c;border:none;color:#0a2342;font-weight:700;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap";
  exportBtn.textContent="↓ Exportar Excel";
  exportBtn.onclick=()=>{state.exportMenu=!state.exportMenu;renderHeader();};
  exportWrap.appendChild(exportBtn);

  if (state.exportMenu) {
    const menu=document.createElement("div");
    menu.style.cssText="position:absolute;right:0;top:40px;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:8px;width:230px;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:200;overflow:hidden";
    const b1=document.createElement("button"); b1.style=Object.assign(b1.style,mbs); b1.textContent="Exportar TODAS las habitaciones"; b1.onclick=()=>exportExcel("all"); Object.assign(b1.style,mbs);
    const b2=document.createElement("button"); b2.textContent=`Solo modificadas (${tc})`; Object.assign(b2.style,mbs); b2.onclick=()=>exportExcel("modified");
    const b3=document.createElement("button"); b3.textContent="Cancelar"; Object.assign(b3.style,{...mbs,color:"var(--color-text-tertiary)"}); b3.onclick=()=>{state.exportMenu=false;renderHeader();};
    menu.appendChild(b1); menu.appendChild(b2); menu.appendChild(b3);
    exportWrap.appendChild(menu);
  }
  el.appendChild(exportWrap);

  const existing=document.getElementById("app-header");
  if (existing) existing.replaceWith(el);
  else document.getElementById("app").prepend(el);

  const el = document.createElement("nav");
  el.id = "app-nav";
  Object.assign(el.style,{background:"var(--color-background-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)",padding:"0 12px",height:"48px",display:"flex",alignItems:"center",gap:"8px",flexShrink:"0",overflowX:"auto"});

  const bSel=document.createElement("select");
  Object.entries(BUILDINGS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v.name;if(k===state.selBuilding)o.selected=true;bSel.appendChild(o);});
  bSel.onchange=e=>{state.selBuilding=e.target.value;state.selFloor="1";state.selRoom=null;render();};
  el.appendChild(bSel);

  const a1=document.createElement("span");a1.textContent="›";a1.style.color="var(--color-text-tertiary)";el.appendChild(a1);

  const fSel=document.createElement("select");
  Object.entries(floors).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=`${v.name} (${v.rooms.length})`;if(k===state.selFloor)o.selected=true;fSel.appendChild(o);});
  fSel.onchange=e=>{state.selFloor=e.target.value;state.selRoom=null;renderNav();renderRoomList();renderRoomDetail();};
  el.appendChild(fSel);

  const a2=document.createElement("span");a2.textContent="›";a2.style.color="var(--color-text-tertiary)";el.appendChild(a2);

  const si=document.createElement("input");si.type="text";si.placeholder="Buscar hab…";si.value=state.search;si.style.width="110px";
  si.oninput=e=>{state.search=e.target.value;renderRoomList();};
  el.appendChild(si);

  if (state.selRoom) {
    const sp=document.createElement("div");sp.style.flex="1";el.appendChild(sp);
    const badge=document.createElement("div");badge.style.cssText="display:flex;align-items:center;gap:6px";
    const lbl=document.createElement("span");lbl.textContent=`HAB. ${state.selRoom}`;lbl.style.cssText="font-size:13px;font-weight:700;color:#0a2342";
    const back=document.createElement("button");back.textContent="← Volver";back.style.cssText="font-size:11px;background:none;border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:3px 8px;cursor:pointer;color:var(--color-text-secondary)";
    back.onclick=()=>{state.selRoom=null;renderNav();renderRoomList();renderRoomDetail();};
    badge.appendChild(lbl);badge.appendChild(back);el.appendChild(badge);
  }

  const existing=document.getElementById("app-nav");
  if (existing) existing.replaceWith(el);
}

function renderRoomList() {
  const list=document.getElementById("room-list");
  if (!list) return;
  const rooms=getCurrentRooms();
  list.innerHTML="";

  const cntEl=document.createElement("div");
  cntEl.style.cssText="padding:10px 10px 6px;font-size:11px;font-weight:600;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.5px";
  cntEl.textContent=`${rooms.length} habitaciones`;
  list.appendChild(cntEl);

  const scroll=document.createElement("div");scroll.style.cssText="flex:1;overflow-y:auto";
  rooms.forEach(roomId=>{
    const stats=getRoomStats(roomId);
    const pct=Math.round((stats.finished/stats.total)*100);
    const active=state.selRoom===roomId;
    const btn=document.createElement("button");
    btn.style.cssText=`width:100%;display:flex;align-items:center;padding:10px 12px;gap:10px;background:${active?"#0a2342":"transparent"};border:none;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent`;
    btn.onclick=()=>{state.selRoom=roomId;renderNav();renderRoomList();renderRoomDetail();};
    const info=document.createElement("div");info.style.flex="1";
    const name=document.createElement("div");name.style.cssText=`font-size:14px;font-weight:600;color:${active?"#c9a84c":"var(--color-text-primary)"}`;name.textContent=`Hab. ${roomId}`;
    const bar=document.createElement("div");bar.style.cssText=`height:3px;border-radius:2px;background:${active?"rgba(255,255,255,0.1)":"var(--color-background-secondary)"};margin-top:5px;overflow:hidden`;
    if(stats.finished>0){const fill=document.createElement("div");fill.style.cssText=`height:100%;width:${pct}%;background:${active?"#c9a84c":"#16a34a"};border-radius:2px`;bar.appendChild(fill);}
    info.appendChild(name);info.appendChild(bar);btn.appendChild(info);
    if(stats.finished>0){const p=document.createElement("span");p.style.cssText=`font-size:11px;font-weight:700;color:${active?"#c9a84c":"#16a34a"}`;p.textContent=`${pct}%`;btn.appendChild(p);}
    else if(stats.started>0){const dot=document.createElement("span");dot.style.cssText="width:8px;height:8px;border-radius:4px;background:#f59e0b;flex-shrink:0;display:block";btn.appendChild(dot);}
    scroll.appendChild(btn);
  });
  list.appendChild(scroll);
}

function renderRoomDetail() {
  const detail=document.getElementById("room-detail");
  if (!detail) return;
  detail.innerHTML="";

  if (!state.selRoom) {
    detail.style.padding="0";
    const tc=getTouchedCount();
    const empty=document.createElement("div");
    empty.style.cssText="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--color-text-tertiary);gap:8px;padding:40px";
    empty.innerHTML=`<div style="font-size:40px">🏨</div><div style="font-size:16px;font-weight:500;color:var(--color-text-primary)">Selecciona una habitación</div><div style="font-size:13px">Elige edificio, planta y habitación en el panel izquierdo</div>`;
    if(tc>0){const sv=document.createElement("div");sv.style.cssText="margin-top:12px;padding:10px 18px;background:#f0fdf4;border-radius:10px;border:1px solid #bbf7d0;font-size:13px;color:#15803d;font-weight:500;text-align:center";sv.textContent=`✓ ${tc} habitaciones con datos guardados en este dispositivo`;empty.appendChild(sv);}
    detail.appendChild(empty);
    return;
  }

  detail.style.padding="16px 18px";
  const roomId=state.selRoom;
  const stats=getRoomStats(roomId);
  const rd=state.roomData[roomId]||{items:{},notes:""};
  const pf=Math.round((stats.finished/stats.total)*100);
  const ps=Math.round((stats.started/stats.total)*100);
  const floors=getCurrentFloors();

  // Header card
  const card=document.createElement("div");
  card.style.cssText="background:var(--color-background-primary);border-radius:12px;padding:14px 16px;margin-bottom:12px;border:0.5px solid var(--color-border-tertiary)";
  card.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><div style="background:#0a2342;color:#c9a84c;border-radius:10px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0">${roomId}</div><div style="flex:1"><div style="font-weight:700;font-size:16px;color:var(--color-text-primary)">Habitación ${roomId}</div><div style="font-size:12px;color:var(--color-text-secondary)">${BUILDINGS[state.selBuilding]?.name} · ${floors[state.selFloor]?.name}</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:#16a34a">${stats.finished}</div><div style="font-size:11px;color:var(--color-text-tertiary)">terminados</div></div></div><div style="margin-bottom:4px;display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary)"><span>Iniciadas: <strong style="color:#d97706">${stats.started}</strong></span><span>Terminadas: <strong style="color:#16a34a">${stats.finished}</strong></span><span style="color:var(--color-text-tertiary)">${stats.total} ítems</span></div><div style="height:6px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden;position:relative"><div style="position:absolute;left:0;top:0;height:100%;width:${ps}%;background:#fbbf24;border-radius:3px;transition:width 0.3s"></div><div style="position:absolute;left:0;top:0;height:100%;width:${pf}%;background:#16a34a;border-radius:3px;transition:width 0.3s"></div></div>`;
  detail.appendChild(card);

  // Categories
  Object.entries(GROUPED_ITEMS).forEach(([cat,items])=>{
    const colors=CAT_COLORS[cat]||{bg:"#f1f5f9",text:"#334155",badge:"#64748b"};
    const doneCount=items.filter(i=>(rd.items[i.id]||{}).finished).length;
    const isCollapsed=!!state.collapsedCats[`${roomId}_${cat}`];
    const section=document.createElement("div");
    section.style.cssText="margin-bottom:8px;border-radius:10px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)";
    const catBtn=document.createElement("button");
    catBtn.style.cssText=`width:100%;display:flex;align-items:center;gap:8px;padding:12px 14px;background:${colors.bg};border:none;cursor:pointer;-webkit-tap-highlight-color:transparent`;
    catBtn.innerHTML=`<span style="flex:1;font-size:13px;font-weight:600;color:${colors.text};text-align:left">${cat}</span><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:${colors.badge};color:#fff">${doneCount}/${items.length}</span><span style="font-size:14px;color:${colors.text};display:inline-block;transform:rotate(${isCollapsed?"-90":"0"}deg);transition:transform 0.2s">▾</span>`;
    catBtn.onclick=()=>{state.collapsedCats[`${roomId}_${cat}`]=!isCollapsed;renderRoomDetail();};
    section.appendChild(catBtn);
    if (!isCollapsed) {
      items.forEach(item=>{
        const is=rd.items[item.id]||{};
        const started=!!is.started,finished=!!is.finished;
        const rowBg=finished?"#f0fdf4":started?"#fffbeb":"var(--color-background-primary)";
        const row=document.createElement("div");
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);background:${rowBg};min-height:52px`;
        const num=document.createElement("span");num.style.cssText="width:26px;height:26px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--color-background-secondary);color:var(--color-text-tertiary)";num.textContent=item.id;
        const desc=document.createElement("span");desc.style.cssText=`flex:1;font-size:14px;line-height:1.35;color:${finished?"#15803d":"var(--color-text-primary)"}`;desc.textContent=item.desc;
        const btnS=document.createElement("button");
        btnS.style.cssText=`flex-shrink:0;width:86px;height:40px;border-radius:8px;border:1.5px solid ${started?"#d97706":"var(--color-border-secondary)"};background:${started?"#d97706":"transparent"};color:${started?"#fff":"var(--color-text-tertiary)"};font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent`;
        btnS.textContent=started?"✓ Iniciada":"Iniciada";btnS.onclick=()=>toggleItem(roomId,item.id,"started");
        const btnF=document.createElement("button");
        btnF.style.cssText=`flex-shrink:0;width:92px;height:40px;border-radius:8px;border:1.5px solid ${finished?"#16a34a":"var(--color-border-secondary)"};background:${finished?"#16a34a":"transparent"};color:${finished?"#fff":"var(--color-text-tertiary)"};font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent`;
        btnF.textContent=finished?"✓ Terminada":"Terminada";btnF.onclick=()=>toggleItem(roomId,item.id,"finished");
        row.appendChild(num);row.appendChild(desc);row.appendChild(btnS);row.appendChild(btnF);
        section.appendChild(row);
      });
    }
    detail.appendChild(section);
  });

  // Notes
  const noteCard=document.createElement("div");
  noteCard.style.cssText="background:var(--color-background-primary);border-radius:12px;padding:14px 16px;margin-top:12px;border:0.5px solid var(--color-border-tertiary)";
  const noteLbl=document.createElement("div");noteLbl.style.cssText="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--color-text-secondary)";noteLbl.textContent="Notas y observaciones";
  const ta=document.createElement("textarea");ta.value=rd.notes||"";ta.placeholder="Incidencias, pendientes o cualquier observación sobre esta habitación…";ta.rows=4;
  const charCnt=document.createElement("div");charCnt.style.cssText="font-size:11px;color:var(--color-text-tertiary);margin-top:4px";charCnt.textContent=`${(rd.notes||"").length} caracteres`;
  ta.oninput=e=>{updateNotes(roomId,e.target.value);charCnt.textContent=`${e.target.value.length} caracteres`;};
  noteCard.appendChild(noteLbl);noteCard.appendChild(ta);noteCard.appendChild(charCnt);
  detail.appendChild(noteCard);
  const sp=document.createElement("div");sp.style.height="32px";detail.appendChild(sp);
}

function render() {
  const app=document.getElementById("app");
  app.innerHTML="";
  const hSlot=document.createElement("div");hSlot.id="app-header";app.appendChild(hSlot);
  const nSlot=document.createElement("nav");nSlot.id="app-nav";app.appendChild(nSlot);
  const content=document.createElement("div");content.id="app-content";content.style.cssText="flex:1;display:flex;overflow:hidden";
  const aside=document.createElement("aside");aside.id="room-list";aside.style.cssText="width:260px;min-width:260px;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-primary);overflow:hidden";
  const main=document.createElement("main");main.id="room-detail";main.style.cssText="flex:1;overflow-y:auto";
  content.appendChild(aside);content.appendChild(main);app.appendChild(content);
  renderHeader();renderNav();renderRoomList();renderRoomDetail();
}

(async () => {
  const app=document.getElementById("app");
  app.innerHTML=`<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--color-text-secondary)"><div style="width:36px;height:36px;border:3px solid var(--color-border-secondary);border-top:3px solid #c9a84c;border-radius:50%" class="spin"></div><div style="font-size:14px">Cargando datos guardados…</div></div>`;
  await loadFromStorage();
  render();
})();
</script>
